<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word of the Week — Customer Service Leadership</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0e1117;
      min-height: 100vh;
      font-family: 'Lora', Georgia, serif;
    }
    .app-wrapper {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(196,158,97,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(99,130,191,0.06) 0%, transparent 60%),
        #0e1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
    }
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: slideDown 0.6s ease forwards;
    }
    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c49e61;
      background: rgba(196,158,97,0.1);
      border: 1px solid rgba(196,158,97,0.2);
      padding: 7px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 900;
      color: #f0e8d8;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .header h1 span { font-style: italic; color: #c49e61; }
    .header-sub {
      margin-top: 10px;
      font-size: 14px;
      color: #6b778d;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
    }
    .card {
      width: 100%;
      max-width: 680px;
      background: linear-gradient(145deg, #171c27 0%, #131720 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(196,158,97,0.05) inset;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .card.fade-out { opacity: 0; transform: translateY(12px); }
    .card.fade-in  { opacity: 1; transform: translateY(0); }
    .card-hero {
      padding: 40px 36px 32px;
      background: linear-gradient(135deg, rgba(196,158,97,0.12) 0%, rgba(196,158,97,0.03) 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .card-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,158,97,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .week-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c49e61;
      margin-bottom: 16px;
    }
    .week-badge::before {
      content: '';
      display: block;
      width: 20px; height: 1px;
      background: #c49e61;
    }
    .word-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(42px, 8vw, 68px);
      font-weight: 900;
      color: #f0e8d8;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 14px;
    }
    .word-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .pronunciation {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #7a8599;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .speak-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1;
      transition: all 0.2s ease;
      background: rgba(196,158,97,0.1);
      border: 1px solid rgba(196,158,97,0.2);
      display: flex;
      align-items: center;
      gap: 6px;
      color: #c49e61;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .speak-btn:hover {
      background: rgba(196,158,97,0.2);
      transform: scale(1.05);
    }
    .speak-btn.speaking {
      background: rgba(196,158,97,0.25);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196,158,97,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(196,158,97,0); }
    }
    .part-of-speech {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0e1117;
      background: #c49e61;
      padding: 4px 12px;
      border-radius: 100px;
    }
    .card-body {
      padding: 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .definition-block {
      padding: 22px 24px;
      background: rgba(240,232,216,0.04);
      border-left: 3px solid #c49e61;
      border-radius: 0 12px 12px 0;
    }
    .definition-text {
      font-family: 'Lora', Georgia, serif;
      font-size: 16px;
      font-style: italic;
      color: #c8d4e8;
      line-height: 1.7;
    }
    .section-block {
      padding: 20px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.04);
    }
    .section-block.accent {
      background: rgba(196,158,97,0.08);
      border-color: rgba(196,158,97,0.25);
    }
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9ca8b8;
      margin-bottom: 10px;
    }
    .section-block.accent .section-label { color: #c49e61; }
    .section-text {
      font-family: 'Lora', Georgia, serif;
      font-size: 15px;
      line-height: 1.75;
      color: #dde4ef;
    }
    .decorative-rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(196,158,97,0.2), transparent);
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .btn-primary {
      flex: 1;
      min-width: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      background: linear-gradient(135deg, #c49e61, #a8823d);
      color: #0e1117;
      border: none;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(196,158,97,0.25);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(196,158,97,0.35);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.05);
      color: #7a8599;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.09);
      color: #c49e61;
      border-color: rgba(196,158,97,0.3);
    }
    .footer-note {
      margin-top: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #3d4555;
      letter-spacing: 0.08em;
      text-align: center;
    }
    .dots { display: inline-flex; gap: 4px; align-items: center; }
    .dots span {
      width: 5px; height: 5px;
      background: #0e1117;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-5px); }
    }

    /* PRINT */
    @media print {
      body, .app-wrapper { background: white !important; }
      .header-eyebrow, .header-sub { color: #666 !important; }
      .header h1 { color: #1a1a1a !important; }
      .header h1 span { color: #a07840 !important; }
      .card {
        background: white !important;
        border: 1px solid #ddd !important;
        box-shadow: none !important;
        max-width: 100% !important;
      }
      .card-hero { background: #faf6ee !important; border-bottom: 1px solid #e0d4c0 !important; }
      .week-badge { color: #a07840 !important; }
      .week-badge::before { background: #a07840 !important; }
      .word-title { color: #1a1a1a !important; }
      .pronunciation { color: #666 !important; }
      .part-of-speech { background: #a07840 !important; color: white !important; }
      .definition-block { background: #faf6ee !important; border-left-color: #a07840 !important; }
      .definition-text { color: #333 !important; }
      .section-block { background: #f9f9f9 !important; border-color: #ddd !important; }
      .section-block.accent { background: #faf6ee !important; border-color: #e0d4c0 !important; }
      .section-label { color: #888 !important; }
      .section-block.accent .section-label { color: #a07840 !important; }
      .section-text { color: #333 !important; }
      .decorative-rule { background: #ddd !important; }
      .actions, .footer-note { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const week1 = {
      week: 1,
      word: "Equanimity",
      pronunciation: "ee-kwuh-NIM-ih-tee",
      partOfSpeech: "Noun",
      definition: "A calm, composed mental steadiness — especially in the face of difficulty, pressure, or uncertainty. Not the absence of emotion, but the graceful management of it.",
      whyItMatters: "Customer service leadership is a pressure cooker. Escalations, understaffed shifts, frustrated customers, and team members looking to you for cues — all before lunch. Equanimity is the quiet superpower that keeps you grounded when everything around you is moving fast. When your team sees you respond to chaos with steady composure rather than reactive energy, they unconsciously mirror it — and so does the customer experience.",
      useItThisWeek: `During your next team huddle after a particularly tough day, try: "I want us to approach tomorrow with equanimity — we know it'll be busy, but we've handled it before, and a steady mindset is our biggest advantage."`,
      funFact: `Equanimity traces back to two Latin roots: aequus (equal, level) and animus (mind, spirit). The Romans essentially coined the idea of a "level mind" — which feels remarkably modern for a word nearly 2,000 years old. The Stoic philosophers practically built their entire philosophy around it.`,
    };

    const SYSTEM_PROMPT = `You are a wordsmith and vocabulary curator specializing in professional development for customer service leaders. Each week, you present one carefully chosen word to a Customer Service Team Lead.

The word must meet ALL criteria:
1. Relevant — connects to customer service, team leadership, communication, conflict resolution, empathy, operational excellence, or professional growth.
2. Intriguing — uncommon enough to spark curiosity, but not so obscure it feels inaccessible.
3. Actionable — practical application in how the Team Lead thinks, speaks, or leads.

Respond ONLY with a valid JSON object. No markdown, no preamble, no backticks. Example structure:
{
  "word": "...",
  "pronunciation": "...",
  "partOfSpeech": "...",
  "definition": "...",
  "whyItMatters": "...",
  "useItThisWeek": "...",
  "funFact": "..."
}

Keep tone warm, professional, and encouraging. Do NOT repeat any previously used words.`;

    function App() {
      const [wordData, setWordData]   = useState(week1);
      const [weekNum, setWeekNum]     = useState(1);
      const [loading, setLoading]     = useState(false);
      const [usedWords, setUsedWords] = useState(["Equanimity"]);
      const [visible, setVisible]     = useState(true);
      const [speaking, setSpeaking]   = useState(false);

      const speakWord = () => {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordData.word);
        utterance.rate = 0.8;
        utterance.pitch = 1;
        utterance.volume = 1;
        utterance.onstart = () => setSpeaking(true);
        utterance.onend   = () => setSpeaking(false);
        utterance.onerror = () => setSpeaking(false);
        window.speechSynthesis.speak(utterance);
      };

      const fetchNextWord = async () => {
        setLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM_PROMPT,
              messages: [{
                role: "user",
                content: `Generate Week ${weekNum + 1}'s Word of the Week. Previously used words (do not repeat): ${usedWords.join(", ")}.`
              }],
            }),
          });
          const data = await res.json();
          const text = data.content?.find(b => b.type === "text")?.text || "";
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setVisible(false);
          setTimeout(() => {
            const next = weekNum + 1;
            setWordData({ ...parsed, week: next });
            setWeekNum(next);
            setUsedWords(prev => [...prev, parsed.word]);
            setVisible(true);
          }, 350);
        } catch (e) {
          alert("Couldn't fetch the next word. Please try again!");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="app-wrapper">
          <div className="header">
            <div className="header-eyebrow">
              📖 Customer Service Leadership
            </div>
            <h1>Word of the <span>Week</span></h1>
            <p className="header-sub">Vocabulary for the modern team lead</p>
          </div>

          <div className={`card ${visible ? "fade-in" : "fade-out"}`}>
            <div className="card-hero">
              <div className="week-badge">Week {wordData.week}</div>
              <div className="word-title">{wordData.word}</div>
              <div className="word-meta">
                <span className="pronunciation">
                  <button className={`speak-btn ${speaking ? "speaking" : ""}`} onClick={speakWord} title="Hear the word">
                    {speaking ? "🔊 Speaking..." : "🔊 Hear it"}
                  </button>
                  {wordData.pronunciation}
                </span>
                <span className="part-of-speech">{wordData.partOfSpeech}</span>
              </div>
            </div>

            <div className="card-body">
              <div className="definition-block">
                <p className="definition-text">{wordData.definition}</p>
              </div>

              <div className="decorative-rule" />

              <div className="section-block accent">
                <div className="section-label">⭐ Why It Matters for You</div>
                <p className="section-text">{wordData.whyItMatters}</p>
              </div>

              <div className="section-block">
                <div className="section-label">⚡ Use It This Week</div>
                <p className="section-text">{wordData.useItThisWeek}</p>
              </div>

              <div className="section-block">
                <div className="section-label">🌱 Fun Fact</div>
                <p className="section-text">{wordData.funFact}</p>
              </div>

              <div className="decorative-rule" />

              <div className="actions">
                <button className="btn-primary" onClick={fetchNextWord} disabled={loading}>
                  {loading
                    ? <span>Generating <span className="dots"><span/><span/><span/></span></span>
                    : `✦ Next Word — Week ${weekNum + 1}`
                  }
                </button>
                <button className="btn-secondary" onClick={() => window.print()}>
                  🖨 Print
                </button>
              </div>
            </div>
          </div>

          <p className="footer-note">✦ Words so far: {usedWords.join(" · ")} ✦</p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
